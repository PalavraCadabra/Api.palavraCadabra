name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: palavracadabra
          POSTGRES_PASSWORD: palavracadabra
          POSTGRES_DB: palavracadabra_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U palavracadabra"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Lint with ruff
        run: uv run ruff check app/

      - name: Type check with mypy
        run: uv run mypy app/ --ignore-missing-imports

      - name: Run tests
        env:
          DATABASE_URL: postgresql+asyncpg://palavracadabra:palavracadabra@localhost:5432/palavracadabra_test
          REDIS_URL: redis://localhost:6379/0
          SECRET_KEY: test-secret-key
        run: uv run pytest -v
